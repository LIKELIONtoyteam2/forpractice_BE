<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>update</title>
  </head>
  <body>
    <h1>Updating Post</h1>

    <form action="{% url 'audit:update_post' update_audit.id %}" method="post">
      {% csrf_token %}
      <p>제목: <input type="text" name="name" value="{{update_audit.name}}" /></p>
      본문 :
      <textarea name="expiration" cols="30" rows="10">{{update_audit.expiration}}</textarea>
      <br />
      <textarea name="open" cols="30" rows="10">{{update_audit.open}}</textarea>
      <button type="submit">수정하기</button>
    </form>
  </body>
</html>
